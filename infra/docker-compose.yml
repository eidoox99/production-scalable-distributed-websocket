services:
  redis:
    image: redis:7.4.2-alpine
    ports:
      - "6379:6379"

  auth-service:
    build:
      context: ..
      dockerfile: apps/auth-service/Dockerfile
    ports:
      - "${AUTH_SERVICE_PORT:-4005}:4005"
    environment:
      PORT: 4005
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
    depends_on:
      - redis

  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - "${API_GATEWAY_PORT:-4010}:4010"
    environment:
      PORT: 4010
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      AUTH_SERVICE_URL: http://auth-service:4005
    depends_on:
      - auth-service

  ws-gateway-a:
    build:
      context: ..
      dockerfile: apps/ws-gateway/Dockerfile
    ports:
      - "${WS_GATEWAY_A_PORT:-4001}:4001"
    environment:
      PORT: 4001
      GATEWAY_ID: gateway_a
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4020}
    depends_on:
      - redis

  ws-gateway-b:
    build:
      context: ..
      dockerfile: apps/ws-gateway/Dockerfile
    ports:
      - "${WS_GATEWAY_B_PORT:-4002}:4002"
    environment:
      PORT: 4002
      GATEWAY_ID: gateway_b
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4020}
    depends_on:
      - redis

  ws-gateway-c:
    build:
      context: ..
      dockerfile: apps/ws-gateway/Dockerfile
    ports:
      - "${WS_GATEWAY_C_PORT:-4003}:4003"
    environment:
      PORT: 4003
      GATEWAY_ID: gateway_c
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4020}
    depends_on:
      - redis

  nginx:
    image: nginx:1.27.4-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - ws-gateway-a
      - ws-gateway-b
      - ws-gateway-c

  client:
    build:
      context: ..
      dockerfile: apps/client/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4010}
        VITE_WS_URL: ${VITE_WS_URL:-http://localhost}
    ports:
      - "${CLIENT_PORT:-4020}:80"
    depends_on:
      - api-gateway
      - nginx
